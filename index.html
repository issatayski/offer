<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web Solutions | Premium Development</title>
    <link rel="stylesheet" href="style.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

    <header class="apple-header">
        <nav>
            <span class="logo">Web Vision</span>
        </nav>
    </header>

    <main class="container">
        <section class="hero">
            <h1>Результат на шаг впереди.</h1>
            <p>Создаем инструменты, которые продают, пока вы отдыхаете.</p>
        </section>

        <div class="card search-section">
            <div class="search-wrapper">
                <span class="search-icon">
                    <svg width="18" height="18" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="9" cy="9" r="7" stroke="#86868b" stroke-width="2"/>
                        <path d="M14 14L18 18" stroke="#86868b" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </span>
                <input type="text" placeholder="Поиск услуг..." id="mainSearch">
            </div>
        </div>

        <div class="card" id="calc-card">
            <h3>Рассчитать стоимость</h3>
            <div class="calc-group">
                <div class="calc-labels">
                    <span>Сложность проекта</span>
                    <span id="days-count">5 дней</span>
                </div>
                <input type="range" id="priceRange" min="1" max="30" value="5">
                <div class="total-price" id="totalPrice">50,000 ₸</div>
            </div>
        </div>

        <div class="features-grid">
            <div class="card small">
                <span class="icon">📱</span>
                <h4>PWA-ready</h4>
                <p>Ваш сайт как приложение на iPhone.</p>
            </div>
            <div class="card small">
                <span class="icon">⚡</span>
                <h4>Clean Code</h4>
                <p>Ничего лишнего. Только HTML/CSS/JS.</p>
            </div>
        </div>
    </main>

    <nav class="tab-bar">
        <a href="#" class="tab-link active">
            <span class="tab-icon">🏠</span>
            <span class="tab-label">Главная</span>
        </a>
        <a href="#" class="tab-link">
            <span class="tab-icon">🌳</span>
            <span class="tab-label">Дерево</span>
        </a>
        <a href="#" class="tab-link">
            <span class="tab-icon">💬</span>
            <span class="tab-label">Связь</span>
        </a>
    </nav>

    <script src="script.js"></script>
</body>
</html>
