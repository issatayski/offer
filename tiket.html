<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WayO — Билеты на автобус онлайн</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .mobile-bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #eee; display: flex; justify-content: space-around; padding: 10px 0; z-index: 50; }
        .safe-area-bottom { padding-bottom: calc(env(safe-area-inset-bottom) + 60px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <header class="bg-white border-b sticky top-0 z-40">
        <div class="max-w-xl mx-auto px-4 h-16 flex items-center justify-between">
            <h1 class="text-2xl font-black text-[#1A56DB]">WayO</h1>
            <div class="flex gap-4 items-center">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Казахстан</span>
                <div class="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center text-sm">👤</div>
            </div>
        </div>
    </header>

    <main class="max-w-xl mx-auto px-4 pt-6 safe-area-bottom">
        
        <section class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 space-y-3">
            <h2 class="text-lg font-bold mb-4">Куда едем?</h2>
            
            <div class="space-y-2">
                <div class="relative">
                    <div class="absolute left-4 top-4 text-blue-500">🔵</div>
                    <input type="text" placeholder="Откуда" value="Астана" class="w-full bg-slate-50 border-none rounded-2xl p-4 pl-12 text-sm font-semibold focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div class="relative">
                    <div class="absolute left-4 top-4 text-slate-300">📍</div>
                    <input type="text" placeholder="Куда" class="w-full bg-slate-50 border-none rounded-2xl p-4 pl-12 text-sm font-semibold focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div class="relative">
                        <div class="absolute left-4 top-4 text-slate-300">📅</div>
                        <input type="text" value="Сегодня" class="w-full bg-slate-50 border-none rounded-2xl p-4 pl-12 text-sm font-semibold outline-none">
                    </div>
                    <div class="relative">
                        <div class="absolute left-4 top-4 text-slate-300">👥</div>
                        <input type="text" value="1 пасс." class="w-full bg-slate-50 border-none rounded-2xl p-4 pl-12 text-sm font-semibold outline-none">
                    </div>
                </div>
            </div>

            <button class="w-full bg-[#1A56DB] text-white py-4 rounded-2xl font-bold mt-4 shadow-lg shadow-blue-200 active:scale-[0.98] transition-all">
                Найти билеты
            </button>
        </section>

        <section class="mt-8 space-y-4">
            <div class="flex justify-between items-center px-1">
                <h3 class="font-bold text-slate-800">Популярные рейсы</h3>
                <button class="text-blue-600 text-xs font-bold uppercase tracking-wider">Все</button>
            </div>

            <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm active:bg-slate-50 transition-colors cursor-pointer">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <p class="text-[10px] font-bold text-blue-600 uppercase">Сегодня • 14:30</p>
                        <h4 class="text-lg font-bold">Астана — Павлодар</h4>
                    </div>
                    <div class="text-right">
                        <p class="text-lg font-black text-slate-900">4 500 ₸</p>
                        <p class="text-[10px] text-green-600 font-bold uppercase">8 мест осталось</p>
                    </div>
                </div>
                <div class="flex items-center gap-3 py-3 border-t border-slate-50">
                    <div class="text-xs text-slate-500 flex items-center gap-1">
                        🚌 Mercedes Travego
                    </div>
                    <div class="text-xs text-slate-500 flex items-center gap-1">
                        ⏱️ 6ч 30м
                    </div>
                </div>
            </div>

            <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm opacity-90">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <p class="text-[10px] font-bold text-slate-400 uppercase">Сегодня • 16:00</p>
                        <h4 class="text-lg font-bold">Астана — Кокшетау</h4>
                    </div>
                    <div class="text-right">
                        <p class="text-lg font-black text-slate-900">3 200 ₸</p>
                        <p class="text-[10px] text-slate-400 font-bold uppercase">42 места</p>
                    </div>
                </div>
                <div class="flex items-center gap-3 py-3 border-t border-slate-50">
                    <div class="text-xs text-slate-500 flex items-center gap-1">
                        🚌 Yutong 6122
                    </div>
                    <div class="text-xs text-slate-500 flex items-center gap-1">
                        ⏱️ 4ч 10м
                    </div>
                </div>
            </div>
        </section>

    </main>

    <nav class="mobile-bottom-nav md:hidden">
        <button class="flex flex-col items-center gap-1 text-blue-600">
            <span class="text-xl">🔍</span>
            <span class="text-[10px] font-bold uppercase">Поиск</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-slate-400">
            <span class="text-xl">🎟️</span>
            <span class="text-[10px] font-bold uppercase">Мои билеты</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-slate-400">
            <span class="text-xl">👤</span>
            <span class="text-[10px] font-bold uppercase">Профиль</span>
        </button>
    </nav>

</body>
</html>
